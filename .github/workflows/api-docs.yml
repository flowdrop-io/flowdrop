name: Build API Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'libs/flowdrop/api/**'
      - 'apps/api-docs/**'
      - '.github/workflows/api-docs.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build API Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/api-docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint API specs
        run: pnpm run lint

      - name: Bundle API specs
        run: pnpm run bundle

      - name: Build versioned documentation
        run: pnpm run build
