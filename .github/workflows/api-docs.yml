name: Deploy API Documentation

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-docs.yml"
  workflow_dispatch: # Allow manual trigger

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build API Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint API spec
        run: npm run api:lint

      - name: Build Redoc documentation
        run: npx @redocly/cli build-docs api/bundled.yaml -o api-docs/index.html

      - name: Create docs assets
        run: |
          # Create a simple landing page if needed
          cat > api-docs/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=/fdnpm/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="/fdnpm/">API Documentation</a>...</p>
          </body>
          </html>
          EOF

          # Add OpenAPI spec for download
          cp api/bundled.yaml api-docs/openapi.yaml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: api-docs

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
