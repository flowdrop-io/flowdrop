name: Deploy API Documentation

on:
  push:
    branches:
      - 1.x
    paths:
      - 'libs/flowdrop/api/**'
      - 'apps/api-docs/**'
      - '.github/workflows/api-docs.yml'
  workflow_dispatch: # Allow manual trigger

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build API Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/api-docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint API spec
        run: pnpm run lint

      - name: Build Redoc documentation
        run: pnpm run build

      - name: Create docs assets
        run: |
          # Create a simple landing page if needed
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=/flowdrop/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="/flowdrop/">API Documentation</a>...</p>
          </body>
          </html>
          EOF

          # Add OpenAPI spec for download
          cp ../../libs/flowdrop/api/bundled.yaml dist/openapi.yaml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/api-docs/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
