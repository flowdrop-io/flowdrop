  /agentspec/flows/validate:
    $ref: './paths/agentspec.yaml#/~1agentspec~1flows~1validate'
  /agentspec/agents:
    $ref: './paths/agentspec.yaml#/~1agentspec~1agents'
  /agentspec/tools:
