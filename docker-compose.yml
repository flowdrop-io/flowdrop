version: "3.8"

services:
  # FlowDrop UI Application
  flowdrop-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowdrop-ui
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Node environment
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      
      # FlowDrop Configuration
      # API Base URL - Update this to point to your FlowDrop backend
      FLOWDROP_API_BASE_URL: ${FLOWDROP_API_BASE_URL:-http://localhost:8080/api/flowdrop}
      
      # Theme configuration
      FLOWDROP_THEME: ${FLOWDROP_THEME:-auto}
      
      # Timeout in milliseconds
      FLOWDROP_TIMEOUT: ${FLOWDROP_TIMEOUT:-30000}
      
      # Authentication configuration
      FLOWDROP_AUTH_TYPE: ${FLOWDROP_AUTH_TYPE:-none}
      FLOWDROP_AUTH_TOKEN: ${FLOWDROP_AUTH_TOKEN:-}
      
      # Application metadata
      FLOWDROP_VERSION: ${FLOWDROP_VERSION:-1.0.0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/config', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - flowdrop-network

networks:
  flowdrop-network:
    driver: bridge

