worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    upstream client {
        server flowdrop-client:3000;
    }

    upstream express {
        server flowdrop-express:3001;
    }

    upstream agentspec {
        server flowdrop-agentspec:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # --- Landing page (served directly by nginx) ---
        location = / {
            root /usr/share/nginx/html;
            try_files /landing/index.html =404;
        }

        location /assets/ {
            alias /usr/share/nginx/html/landing/;
        }

        # --- FlowDrop API (Express server) ---
        # The client defaults to /api/flowdrop (relative), so this is transparent.
        location /api/flowdrop/ {
            proxy_pass http://express/api/flowdrop/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Agent Spec Runtime (FastAPI server) ---
        # Strip /agentspec prefix when proxying to FastAPI.
        location /agentspec/ {
            proxy_pass http://agentspec/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for LLM execution
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # --- FlowDrop UI (SvelteKit client) ---
        # Mounted at /editor — rewrite to / before proxying to SvelteKit.
        location /editor {
            rewrite ^/editor(/.*)$ $1 break;
            rewrite ^/editor$ / break;
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- SvelteKit internal assets ---
        # SvelteKit generates /_app/ paths for its JS/CSS bundles.
        # These must be proxied to the client without rewriting.
        location /_app/ {
            proxy_pass http://client;
            proxy_set_header Host $host;
        }

        # --- Client API config endpoint ---
        # The SvelteKit client exposes /api/config for health checks.
        location /api/config {
            proxy_pass http://client;
            proxy_set_header Host $host;
        }
    }
}
