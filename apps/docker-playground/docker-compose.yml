# =============================================================
# FlowDrop Docker Playground — All-in-One Demo
# =============================================================
#
# Quick start:
#   docker compose up --build
#
# Then open http://localhost in your browser.

services:
  # --- Nginx reverse proxy (entry point) ---
  nginx:
    image: nginx:1.27-alpine
    container_name: flowdrop-playground
    ports:
      - "${PLAYGROUND_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./landing:/usr/share/nginx/html/landing:ro
    depends_on:
      flowdrop-client:
        condition: service_healthy
      flowdrop-express:
        condition: service_healthy
    networks:
      - flowdrop-playground
    restart: unless-stopped

  # --- FlowDrop UI (SvelteKit client) ---
  flowdrop-client:
    build:
      context: ../example-client-docker
      dockerfile: Dockerfile
    container_name: flowdrop-client
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      FLOWDROP_API_BASE_URL: /api/flowdrop
      FLOWDROP_AGENTSPEC_BASE_URL: /agentspec
      FLOWDROP_THEME: ${FLOWDROP_THEME:-auto}
      FLOWDROP_TIMEOUT: ${FLOWDROP_TIMEOUT:-30000}
      FLOWDROP_VERSION: ${FLOWDROP_VERSION:-playground}
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3000/api/config', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - flowdrop-playground
    restart: unless-stopped

  # --- FlowDrop API (Express server) ---
  flowdrop-express:
    build:
      context: ../../
      dockerfile: apps/docker-playground/dockerfiles/express.Dockerfile
    container_name: flowdrop-express
    environment:
      NODE_ENV: production
      PORT: 3001
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3001/api/flowdrop/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - flowdrop-playground
    restart: unless-stopped

  # --- Agent Spec Runtime (FastAPI server) ---
  flowdrop-agentspec:
    build:
      context: ../../
      dockerfile: apps/docker-playground/dockerfiles/agentspec.Dockerfile
    container_name: flowdrop-agentspec
    environment:
      PORT: 8000
      ROOT_PATH: /agentspec
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - flowdrop-playground
    restart: unless-stopped

networks:
  flowdrop-playground:
    driver: bridge
