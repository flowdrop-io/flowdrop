openapi: 3.0.3
info:
  title: FlowDrop API
  description: |
    FlowDrop is a visual workflow editor for AI applications and data processing pipelines.
    This API provides comprehensive endpoints for managing workflows, node types, pipeline execution, and port configuration.

    ## Features
    - **Workflow Management**: Complete CRUD operations for workflows with nodes and edges
    - **Node Type Discovery**: Browse and search available node processors with metadata
    - **Pipeline Execution**: Execute workflows with real-time status tracking and job management
    - **Port Configuration**: Dynamic port compatibility system with data type management
    - **Real-time Updates**: Track node execution status and pipeline progress
    - **Import/Export**: Import and export workflows in JSON format
    - **Validation**: Workflow validation before execution

    ## Architecture
    - **Frontend**: Svelte 5 + XYFlow for visual workflow editing
    - **Backend**: Drupal 10/11 with custom node processor plugins
    - **API**: RESTful JSON API with consistent response format
    - **Storage**: Drupal entity system with workflow versioning

    ## Authentication
    API endpoints require Drupal authentication. Use Bearer token or session-based authentication.

    ## Rate Limiting
    - Node Discovery: 100 requests/minute
    - Workflow Operations: 50 requests/minute
    - Pipeline Execution: 20 requests/minute

    ## Error Handling
    All errors return a consistent format with success flag, error message, and optional details.
  version: 1.0.0
  contact:
    name: FlowDrop Support
    email: shibinkidd@gmail.com
    url: https://www.drupal.org/project/issues/flowdrop?categories=All

servers:
  - url: http://localhost:5173/api/flowdrop
    description: Local development server (Svelte)
  - url: https://flowdrop.ddev.site/api/flowdrop
    description: Local Drupal server

security:
  - BearerAuth: []
  - SessionAuth: []

paths:
  # ===== HEALTH CHECK =====
  /health:
    get:
      summary: API health check
      description: Check if the FlowDrop API is running and responsive
      tags:
        - System
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 1.0.0

  # ===== NODE TYPES =====
  /nodes:
    get:
      summary: Get all available node types
      description: |
        Retrieve all available node processors with optional filtering by category, search query, and pagination.
        Supports filtering by node category (models, data_processing, input_output, etc.) and search queries.
      tags:
        - Node Types
      parameters:
        - name: category
          in: query
          description: Filter by node category
          required: false
          schema:
            type: string
            enum:
              - ai
              - models
              - inputs
              - outputs
              - prompts
              - processing
              - logic
              - data
              - helpers
              - tools
              - vectorstores
              - embeddings
              - memories
              - agents
              - bundles
              - input
              - output
              - conditional
              - utility
              - integration
        - name: search
          in: query
          description: Search node types by name, description, or tags
          required: false
          schema:
            type: string
            maxLength: 100
        - name: limit
          in: query
          description: Maximum number of results (1-1000)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          description: Number of results to skip for pagination
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of node types retrieved successfully
          headers:
            X-Total-Count:
              description: Total number of nodes matching the filter
              schema:
                type: integer
            X-Page-Size:
              description: Number of nodes per page
              schema:
                type: integer
            X-Page-Offset:
              description: Current page offset
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodesResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      - id: openai_chat_executor
                        name: OpenAI Chat
                        description: Chat completion using OpenAI's GPT models
                        category: ai
                        version: 1.0.0
                        icon: mdi:chat
                        color: '#10a37f'
                        type: default
                        supportedTypes:
                          - default
                          - simple
                        inputs:
                          - id: data
                            name: Input Data
                            type: input
                            dataType: mixed
                            required: false
                            description: Input data for the node
                        outputs:
                          - id: response
                            name: Response
                            type: output
                            dataType: string
                            description: The OpenAI response
                        configSchema:
                          type: object
                          properties:
                            model:
                              type: string
                              title: Model
                              default: gpt-4o-mini
                              enum:
                                - gpt-4o-mini
                                - gpt-5
                                - gpt-4.1
                            temperature:
                              type: number
                              title: Temperature
                              default: 0.7
                              minimum: 0
                              maximum: 2
                            maxTokens:
                              type: integer
                              title: Max Tokens
                              default: 1000
                              minimum: 1
                              maximum: 4096
                            apiKey:
                              type: string
                              title: API Key
                              format: hidden
                        tags:
                          - openai
                          - gpt
                          - chat
                          - ai
                    message: Found 1 node types
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /nodes/{id}:
    get:
      summary: Get node type by ID
      description: Retrieve detailed metadata for a specific node type by its unique identifier
      tags:
        - Node Types
      parameters:
        - name: id
          in: path
          description: Node type unique identifier
          required: true
          schema:
            type: string
            example: calculator
      responses:
        '200':
          description: Node type details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeTypeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== PORT CONFIGURATION =====
  /port-config:
    get:
      summary: Get port configuration
      description: |
        Retrieve the complete port configuration system including available data types,
        compatibility rules, and default settings. This configuration determines how
        nodes can be connected in workflows based on port data types.
      tags:
        - Configuration
      responses:
        '200':
          description: Port configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortConfigResponse'
              example:
                success: true
                data:
                  version: 1.0.0
                  defaultDataType: mixed
                  dataTypes:
                    - id: string
                      name: String
                      description: Text data type
                      color: '#3b82f6'
                      category: primitive
                      aliases:
                        - text
                        - str
                      enabled: true
                    - id: number
                      name: Number
                      description: Numeric data type
                      color: '#10b981'
                      category: primitive
                      enabled: true
                    - id: mixed
                      name: Mixed
                      description: Any data type
                      color: '#6b7280'
                      category: special
                      enabled: true
                  compatibilityRules:
                    - from: string
                      to: mixed
                      description: Strings can connect to mixed ports
                    - from: number
                      to: mixed
                      description: Numbers can connect to mixed ports
                    - from: mixed
                      to: string
                      description: Mixed can connect to string with conversion
                message: Port configuration loaded successfully
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== WORKFLOWS =====
  /workflows:
    get:
      summary: Get all workflows
      description: |
        Retrieve all workflows with optional search filtering and pagination.
        Returns workflow metadata including nodes, edges, and execution history.
      tags:
        - Workflows
      parameters:
        - name: search
          in: query
          description: Search workflows by name or description
          required: false
          schema:
            type: string
            maxLength: 100
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of workflows to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          description: Number of workflows to skip
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          description: Sort field
          required: false
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - name
            default: updated_at
        - name: order
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: List of workflows retrieved successfully
          headers:
            X-Total-Count:
              description: Total number of workflows
              schema:
                type: integer
            X-Page-Size:
              description: Workflows per page
              schema:
                type: integer
            X-Page-Offset:
              description: Current page offset
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new workflow
      description: |
        Create a new workflow with the provided name, description, nodes, and edges.
        The workflow will be assigned a unique UUID and metadata will be automatically generated.
      tags:
        - Workflows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
            examples:
              basic:
                summary: Basic workflow creation
                value:
                  name: My First Workflow
                  description: A simple workflow for testing
                  nodes: []
                  edges: []
              withNodes:
                summary: Workflow with nodes
                value:
                  name: AI Chat Workflow
                  description: Chat workflow using OpenAI
                  nodes:
                    - id: node-1
                      type: text_input
                      position:
                        x: 100
                        y: 100
                      data:
                        label: User Input
                        config:
                          placeholder: Enter your question
                        metadata:
                          id: text_input
                          name: Text Input
                          category: inputs
                          version: 1.0.0
                          inputs: []
                          outputs:
                            - id: value
                              name: Value
                              type: output
                              dataType: string
                  edges: []
                  tags:
                    - ai
                    - chat
      responses:
        '201':
          description: Workflow created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /workflows/{id}:
    get:
      summary: Get workflow by ID
      description: Retrieve a specific workflow with all its nodes, edges, and metadata
      tags:
        - Workflows
      parameters:
        - name: id
          in: path
          description: Workflow UUID
          required: true
          schema:
            type: string
            format: uuid
            example: '123e4567-e89b-12d3-a456-426614174000'
      responses:
        '200':
          description: Workflow details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update workflow
      description: |
        Update an existing workflow. All fields are optional - only provided fields will be updated.
        The updatedAt timestamp will be automatically set to the current time.
      tags:
        - Workflows
      parameters:
        - name: id
          in: path
          description: Workflow UUID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRequest'
      responses:
        '200':
          description: Workflow updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete workflow
      description: Permanently delete a workflow and all associated data including execution history
      tags:
        - Workflows
      parameters:
        - name: id
          in: path
          description: Workflow UUID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workflow deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Workflow deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== WORKFLOW VALIDATION =====
  /workflows/validate:
    post:
      summary: Validate workflow
      description: |
        Validate a workflow structure without saving it. Checks for:
        - Valid node connections and port compatibility
        - Required configuration fields
        - Circular dependencies
        - Orphaned nodes
        - Missing required inputs
      tags:
        - Validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workflow'
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== WORKFLOW IMPORT/EXPORT =====
  /workflows/{id}/export:
    get:
      summary: Export workflow
      description: Export a workflow as JSON or YAML format
      tags:
        - Import/Export
      parameters:
        - name: id
          in: path
          description: Workflow UUID
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          description: Export format
          required: false
          schema:
            type: string
            enum:
              - json
              - yaml
            default: json
      responses:
        '200':
          description: Workflow exported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
            application/x-yaml:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /workflows/import:
    post:
      summary: Import workflow
      description: Import a workflow from JSON format. A new UUID will be assigned to the imported workflow.
      tags:
        - Import/Export
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workflow'
      responses:
        '201':
          description: Workflow imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== PIPELINE EXECUTION =====
  /workflow/{workflow_id}/pipelines:
    get:
      summary: List workflow pipelines
      description: Get all pipeline executions for a specific workflow
      tags:
        - Pipeline
      parameters:
        - name: workflow_id
          in: path
          description: Workflow ID or machine name
          required: true
          schema:
            type: string
        - name: status
          in: query
          description: Filter by pipeline status
          required: false
          schema:
            type: string
            enum:
              - pending
              - running
              - completed
              - failed
              - cancelled
      responses:
        '200':
          description: List of pipeline executions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /pipeline/{id}:
    get:
      summary: Get pipeline execution details
      description: |
        Retrieve detailed information about a pipeline execution including:
        - Overall pipeline status
        - Individual job statuses for each node
        - Node execution information (execution count, duration, errors)
        - Job status summary
      tags:
        - Pipeline
      parameters:
        - name: id
          in: path
          description: Pipeline UUID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDetailResponse'
              example:
                status: running
                jobs:
                  - id: job-1
                    node_id: node-1
                    status: completed
                    execution_count: 5
                    started: '2024-01-20T10:00:00Z'
                    completed: '2024-01-20T10:00:05Z'
                    execution_time: 5000
                  - id: job-2
                    node_id: node-2
                    status: running
                    execution_count: 3
                    started: '2024-01-20T10:00:05Z'
                node_statuses:
                  node-1:
                    status: completed
                    last_executed: '2024-01-20T10:00:05Z'
                    execution_time: 5000
                  node-2:
                    status: running
                    last_executed: '2024-01-20T10:00:05Z'
                job_status_summary:
                  total: 5
                  pending: 0
                  running: 1
                  completed: 3
                  failed: 1
                  cancelled: 0
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /pipeline/{id}/execute:
    post:
      summary: Execute pipeline
      description: Start execution of a pipeline
      tags:
        - Pipeline
      parameters:
        - name: id
          in: path
          description: Pipeline UUID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inputs:
                  type: object
                  description: Input values for specific nodes
                  additionalProperties: true
                options:
                  type: object
                  properties:
                    timeout:
                      type: integer
                      description: Execution timeout in seconds
                    maxSteps:
                      type: integer
                      description: Maximum number of execution steps
      responses:
        '202':
          description: Pipeline execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineExecutionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /pipeline/{id}/stop:
    post:
      summary: Stop pipeline execution
      description: Cancel a running pipeline execution
      tags:
        - Pipeline
      parameters:
        - name: id
          in: path
          description: Pipeline UUID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline stopped successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Pipeline cannot be stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /pipeline/{id}/logs:
    get:
      summary: Get pipeline execution logs
      description: Retrieve detailed execution logs for a pipeline
      tags:
        - Pipeline
      parameters:
        - name: id
          in: path
          description: Pipeline UUID
          required: true
          schema:
            type: string
            format: uuid
        - name: level
          in: query
          description: Filter by log level
          required: false
          schema:
            type: string
            enum:
              - debug
              - info
              - warning
              - error
      responses:
        '200':
          description: Pipeline logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogEntry'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication
    SessionAuth:
      type: apiKey
      in: cookie
      name: SESS
      description: Drupal session cookie

  schemas:
    # ===== COMMON TYPES =====
    NodeCategory:
      type: string
      enum:
        - ai
        - models
        - inputs
        - outputs
        - prompts
        - processing
        - logic
        - data
        - helpers
        - tools
        - vectorstores
        - embeddings
        - memories
        - agents
        - bundles
        - input
        - output
        - conditional
        - utility
        - integration
      description: Node category for organizing nodes in the sidebar

    NodeDataType:
      type: string
      description: |
        Data type for node ports. The available data types are configured
        dynamically through the port configuration system.
      example: mixed

    NodeType:
      type: string
      enum:
        - note
        - simple
        - square
        - tool
        - gateway
        - default
      description: Visual rendering type for the node

    NodeExecutionStatus:
      type: string
      enum:
        - idle
        - pending
        - running
        - completed
        - failed
        - cancelled
        - skipped
      description: Current execution status of a node

    # ===== PORT CONFIGURATION =====
    PortDataTypeConfig:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the data type
          example: string
        name:
          type: string
          description: Display name for the data type
          example: String
        description:
          type: string
          description: Description of the data type
          example: Text data type
        color:
          type: string
          description: Color for the data type (CSS color value)
          example: '#3b82f6'
        category:
          type: string
          description: Category grouping for the data type
          example: primitive
        aliases:
          type: array
          items:
            type: string
          description: Alternative names for this data type
          example:
            - text
            - str
        enabled:
          type: boolean
          default: true
          description: Whether this data type is enabled
      required:
        - id
        - name
        - color

    PortCompatibilityRule:
      type: object
      properties:
        from:
          type: string
          description: Source data type ID (what you're connecting FROM)
          example: string
        to:
          type: string
          description: Target data type ID (what you're connecting TO)
          example: mixed
        description:
          type: string
          description: Optional description of why this connection is allowed
          example: Strings can connect to mixed ports
      required:
        - from
        - to

    PortConfig:
      type: object
      properties:
        version:
          type: string
          description: Version of the port configuration
          example: 1.0.0
        defaultDataType:
          type: string
          description: Default data type to use when none specified
          example: mixed
        dataTypes:
          type: array
          items:
            $ref: '#/components/schemas/PortDataTypeConfig'
          description: Available data types
        compatibilityRules:
          type: array
          items:
            $ref: '#/components/schemas/PortCompatibilityRule'
          description: Compatibility rules between data types
      required:
        - dataTypes
        - defaultDataType

    # ===== NODE TYPES =====
    NodePort:
      type: object
      properties:
        id:
          type: string
          description: Port unique identifier
          example: data
        name:
          type: string
          description: Port display name
          example: Input Data
        type:
          type: string
          enum:
            - input
            - output
            - metadata
          description: Port type
        dataType:
          $ref: '#/components/schemas/NodeDataType'
        required:
          type: boolean
          default: false
          description: Whether the port is required
        description:
          type: string
          description: Port description
          example: Input data for the node
        defaultValue:
          description: Default value for the port
      required:
        - id
        - name
        - type
        - dataType

    ConfigProperty:
      type: object
      properties:
        type:
          type: string
          enum:
            - string
            - number
            - boolean
            - array
            - object
            - integer
        title:
          type: string
          description: Display title for the property
        description:
          type: string
          description: Property description
        default:
          description: Default value for the property
        enum:
          type: array
          items: {}
          description: Allowed values for enum properties
        multiple:
          type: boolean
          description: For enum fields, allows multiple selection
        minimum:
          type: number
          description: Minimum value for numeric properties
        maximum:
          type: number
          description: Maximum value for numeric properties
        minLength:
          type: integer
          description: Minimum length for string properties
        maxLength:
          type: integer
          description: Maximum length for string properties
        pattern:
          type: string
          description: Regex pattern for string validation
        format:
          type: string
          description: Special formats (multiline for textarea, hidden to hide field)
          enum:
            - multiline
            - hidden
            - email
            - uri
            - date
            - date-time
        items:
          $ref: '#/components/schemas/ConfigProperty'
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ConfigProperty'
      required:
        - type

    ConfigSchema:
      type: object
      properties:
        type:
          type: string
          enum:
            - object
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ConfigProperty'
          description: Configuration properties
        required:
          type: array
          items:
            type: string
          description: Required property names
        additionalProperties:
          type: boolean
          default: false
      required:
        - type
        - properties

    NodeMetadata:
      type: object
      properties:
        id:
          type: string
          description: Node type unique identifier
          example: calculator
        name:
          type: string
          description: Node type display name
          example: Calculator
        type:
          $ref: '#/components/schemas/NodeType'
        supportedTypes:
          type: array
          items:
            $ref: '#/components/schemas/NodeType'
          description: Array of supported rendering types
        description:
          type: string
          description: Node type description
          example: Perform mathematical operations on input data
        category:
          $ref: '#/components/schemas/NodeCategory'
        version:
          type: string
          description: Node type version
          example: 1.0.0
        icon:
          type: string
          description: Icon identifier (Material Design Icons)
          example: mdi:calculator
        color:
          type: string
          description: Node color (CSS color value)
          example: '#3b82f6'
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/NodePort'
          description: Input ports
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/NodePort'
          description: Output ports
        configSchema:
          $ref: '#/components/schemas/ConfigSchema'
        tags:
          type: array
          items:
            type: string
          description: Node tags for search and filtering
          example:
            - math
            - calculation
            - processing
      required:
        - id
        - name
        - description
        - category
        - version
        - inputs
        - outputs

    # ===== WORKFLOW TYPES =====
    Position:
      type: object
      properties:
        x:
          type: number
          description: X coordinate
          example: 100
        y:
          type: number
          description: Y coordinate
          example: 200
      required:
        - x
        - y

    NodeExecutionInfo:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/NodeExecutionStatus'
        executionCount:
          type: integer
          description: Total number of times this node has been executed
          example: 5
        lastExecuted:
          type: string
          format: date-time
          description: Last execution timestamp
        lastExecutionDuration:
          type: integer
          description: Last execution duration in milliseconds
          example: 1500
        lastError:
          type: string
          description: Last error message if execution failed
        isExecuting:
          type: boolean
          description: Whether the node is currently being executed
      required:
        - status
        - executionCount
        - isExecuting

    WorkflowNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Node instance UUID
        type:
          type: string
          description: Node type ID (references NodeMetadata.id)
          example: calculator
        position:
          $ref: '#/components/schemas/Position'
        deletable:
          type: boolean
          default: true
        data:
          type: object
          properties:
            label:
              type: string
              description: Node instance label
              example: Math Calculator
            config:
              type: object
              additionalProperties: true
              description: Node configuration values
              example:
                operation: add
                precision: 2
            metadata:
              $ref: '#/components/schemas/NodeMetadata'
            isProcessing:
              type: boolean
              description: Whether the node is currently processing
            error:
              type: string
              description: Error message if node execution failed
            nodeId:
              type: string
              description: Alternative node ID
            executionInfo:
              $ref: '#/components/schemas/NodeExecutionInfo'
          required:
            - label
            - config
            - metadata
      required:
        - id
        - type
        - position
        - data

    WorkflowEdge:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Edge UUID
        source:
          type: string
          format: uuid
          description: Source node UUID
        target:
          type: string
          format: uuid
          description: Target node UUID
        sourceHandle:
          type: string
          description: Source port ID
        targetHandle:
          type: string
          description: Target port ID
        type:
          type: string
          description: Connection line type
          enum:
            - default
            - straight
            - step
            - smoothstep
        selectable:
          type: boolean
          default: true
        deletable:
          type: boolean
          default: true
        data:
          type: object
          properties:
            label:
              type: string
              description: Edge label
            condition:
              type: string
              description: Conditional expression for conditional edges
            metadata:
              type: object
              description: Edge metadata for API and persistence
              properties:
                edgeType:
                  type: string
                  enum:
                    - tool
                    - data
                  description: Edge type for visual styling
                sourcePortDataType:
                  type: string
                  description: Data type of the source output port (e.g., tool, string, number)
            isToolConnection:
              type: boolean
              description: Whether this is a tool connection (deprecated, use metadata.edgeType instead)
            targetNodeType:
              type: string
              description: Target node type
            targetCategory:
              type: string
              description: Target node category
      required:
        - id
        - source
        - target

    WorkflowMetadata:
      type: object
      properties:
        version:
          type: string
          description: Workflow version
          example: 1.0.0
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        author:
          type: string
          description: Workflow author
          example: admin
        tags:
          type: array
          items:
            type: string
          description: Workflow tags
          example:
            - ai
            - production
        versionId:
          type: string
          description: Version control ID
        updateNumber:
          type: integer
          description: Update sequence number
      required:
        - version
        - createdAt
        - updatedAt

    Workflow:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Workflow UUID
        name:
          type: string
          description: Workflow name
          example: My AI Workflow
          maxLength: 200
        description:
          type: string
          description: Workflow description
          maxLength: 1000
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
          description: Workflow nodes
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
          description: Workflow edges
        metadata:
          $ref: '#/components/schemas/WorkflowMetadata'
      required:
        - id
        - name
        - nodes
        - edges
        - metadata

    # ===== REQUEST/RESPONSE TYPES =====
    CreateWorkflowRequest:
      type: object
      properties:
        name:
          type: string
          description: Workflow name
          minLength: 1
          maxLength: 200
          example: My First Workflow
        description:
          type: string
          description: Workflow description
          maxLength: 1000
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 20
      required:
        - name

    UpdateWorkflowRequest:
      type: object
      properties:
        name:
          type: string
          description: Workflow name
          minLength: 1
          maxLength: 200
        description:
          type: string
          description: Workflow description
          maxLength: 1000
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        metadata:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
                maxLength: 50
              maxItems: 20
            author:
              type: string
              maxLength: 100

    # ===== RESPONSE TYPES =====
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the request was successful
        data:
          description: Response data (type varies by endpoint)
        message:
          type: string
          description: Response message
        error:
          type: string
          description: Error message (if any)

    NodesResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/NodeMetadata'

    NodeTypeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NodeMetadata'

    PortConfigResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PortConfig'

    WorkflowsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Workflow'

    WorkflowResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Workflow'

    ValidationResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                valid:
                  type: boolean
                  description: Whether the workflow is valid
                errors:
                  type: array
                  items:
                    type: string
                  description: Validation errors
                warnings:
                  type: array
                  items:
                    type: string
                  description: Validation warnings
                suggestions:
                  type: array
                  items:
                    type: string
                  description: Improvement suggestions

    # ===== PIPELINE TYPES =====
    JobStatus:
      type: object
      properties:
        id:
          type: string
          description: Job UUID
        node_id:
          type: string
          description: Node instance UUID
        status:
          $ref: '#/components/schemas/NodeExecutionStatus'
        execution_count:
          type: integer
          description: Number of times executed
        started:
          type: string
          format: date-time
          description: Job start time
        completed:
          type: string
          format: date-time
          description: Job completion time
        execution_time:
          type: integer
          description: Execution time in milliseconds
        error_message:
          type: string
          description: Error message if failed

    NodeStatus:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/NodeExecutionStatus'
        last_executed:
          type: string
          format: date-time
        execution_time:
          type: integer
          description: Last execution time in milliseconds
        error:
          type: string
          description: Last error message

    JobStatusSummary:
      type: object
      properties:
        total:
          type: integer
          description: Total number of jobs
        pending:
          type: integer
          description: Number of pending jobs
        running:
          type: integer
          description: Number of running jobs
        completed:
          type: integer
          description: Number of completed jobs
        failed:
          type: integer
          description: Number of failed jobs
        cancelled:
          type: integer
          description: Number of cancelled jobs
      required:
        - total
        - pending
        - running
        - completed
        - failed
        - cancelled

    PipelineDetailResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - pending
            - running
            - completed
            - failed
            - cancelled
          description: Overall pipeline status
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobStatus'
          description: Individual job statuses
        node_statuses:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NodeStatus'
          description: Node execution statuses keyed by node ID
        job_status_summary:
          $ref: '#/components/schemas/JobStatusSummary'
      required:
        - status
        - jobs
        - node_statuses
        - job_status_summary

    PipelineListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  workflow_id:
                    type: string
                  status:
                    type: string
                  created:
                    type: string
                    format: date-time
                  updated:
                    type: string
                    format: date-time

    PipelineExecutionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                pipeline_id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum:
                    - pending
                    - running
                message:
                  type: string

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Log entry timestamp
        level:
          type: string
          enum:
            - debug
            - info
            - warning
            - error
          description: Log level
        message:
          type: string
          description: Log message
        node_id:
          type: string
          description: Associated node ID
        context:
          type: object
          additionalProperties: true
          description: Additional context data

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            success:
              type: boolean
              example: false
            error:
              type: string
              description: Error message
            code:
              type: string
              description: Error code
            details:
              type: object
              description: Additional error details

  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Invalid request parameters
            code: VALIDATION_ERROR
            details:
              field: name
              message: Name is required

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Authentication required
            code: UNAUTHORIZED

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Resource not found
            code: NOT_FOUND

    ValidationError:
      description: Validation error - request data failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Validation failed
            code: VALIDATION_ERROR
            details:
              errors:
                - "Node 'node-1' has invalid configuration"
                - "Edge 'edge-1' connects to non-existent node"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Internal server error
            code: INTERNAL_ERROR

tags:
  - name: System
    description: System health and status endpoints
  - name: Node Types
    description: Node type discovery and metadata endpoints
  - name: Configuration
    description: System configuration endpoints including port configuration
  - name: Workflows
    description: Workflow CRUD operations
  - name: Pipeline
    description: Pipeline execution and monitoring
  - name: Validation
    description: Workflow validation
  - name: Import/Export
    description: Workflow import and export operations
