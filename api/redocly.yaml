# Redocly Configuration
# OpenAPI linting, validation, and bundling settings
#
# Run: npm run api:lint
# Docs: https://redocly.com/docs/cli/configuration/

# Extend the recommended ruleset
extends:
  - recommended

# API definitions
apis:
  main:
    root: ./openapi.yaml

# Linting rules - stricter for production quality
rules:
  # === ERRORS (must fix) ===

  # All operations must have unique IDs (required for code generation)
  operation-operationId: error
  operation-operationId-unique: error

  # Operations must have summaries
  operation-summary: error

  # Require tags on all operations
  operation-tag-defined: error

  # Path parameters must be defined
  path-parameters-defined: error

  # Security schemes must be defined
  security-defined: error

  # Paths should not have trailing slashes
  no-path-trailing-slash: error

  # Request/response must have valid content types
  request-mime-type:
    severity: error
    allowedValues:
      - application/json
      - application/x-yaml
      - multipart/form-data

  response-mime-type:
    severity: error
    allowedValues:
      - application/json
      - application/x-yaml

  # === WARNINGS (should fix) ===

  # Require descriptions on tags
  tag-description: warn

  # Warn about unused components (dead code)
  no-unused-components: warn

  # Operations should have descriptions
  operation-description: warn

  # 4xx responses recommended (warn for health endpoints)
  operation-4xx-response: warn

  # Example validation
  no-invalid-media-type-examples: warn
  no-invalid-schema-examples: warn

  # Info section recommendations
  info-contact: warn
  info-license: off

  # === OFF (intentionally disabled) ===

  # Parameter descriptions optional (too verbose for simple params)
  parameter-description: off

  # Allow localhost in servers for development
  no-server-example.com: off

  # Schema descriptions optional (we use inline comments)
  # schema-description: off
